name: Full-Stack Codecov Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Use Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '18.x' # Adjust this if you use a different node version

    # --- 1. TEST THE BACKEND ---
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm install

    - name: Run Backend Tests & Generate Coverage
      working-directory: ./backend
      env:
        MONGO_URI: ${{ secrets.MONGO_TEST_URI }}
      run: npm test -- --coverage

    # --- 2. TEST THE FRONTEND ---
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm install

    - name: Run Frontend Tests & Generate Coverage
      working-directory: ./frontend
      run: npm test -- --coverage

    # --- 3. UPLOAD EVERYTHING TO CODECOV ---
    - name: Upload backend coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: backend/coverage/lcov.info
        flags: backend

    - name: Upload frontend coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: frontend/coverage/lcov.info
        flags: frontend