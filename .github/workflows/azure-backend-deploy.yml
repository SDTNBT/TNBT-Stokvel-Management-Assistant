name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
    # This ensures the backend pipeline only runs if backend code is changed
    paths:
      - 'backend/**' 
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # This tells the pipeline to run all terminal commands inside the backend folder
    defaults:
      run:
        working-directory: ./backend 

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '24.x' # Updated to match Azure environment

    - name: Install dependencies
      run: npm install

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'stokvelStokkieBack' 
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./backend # Points Azure strictly to the backend folder
