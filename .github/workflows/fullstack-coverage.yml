name: Full-Stack Test & Coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # You can change this to 18 if your project requires it

    # --- BACKEND TESTING ---
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm install

    - name: Run Backend Tests & Generate Coverage
      working-directory: ./backend
      run: npm test -- --coverage

    # --- FRONTEND TESTING ---
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm install

    - name: Run Frontend Tests & Generate Coverage
      working-directory: ./frontend
      # watchAll=false prevents React scripts from hanging forever in the cloud
      run: npm test -- --coverage --watchAll=false 

    # --- CODECOV UPLOAD ---
    - name: Upload Unified Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # Make sure this secret is in your GitHub Repo settings!
        fail_ci_if_error: true
