name: Full-Stack Test & Coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 

    # --- BACKEND TESTING ---
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm install

    - name: Run Backend Tests & Generate Coverage
      working-directory: ./backend
      run: npm test -- --coverage

    # --- FRONTEND TESTING ---
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm install

    - name: Run Frontend Tests & Generate Coverage
      working-directory: ./frontend
      run: npm test -- --coverage --watchAll=false 

    # --- CODACY UPLOAD ---
    - name: Run Codacy Coverage Reporter
      env:
        CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      run: |
        bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r backend/coverage/lcov.info -r frontend/coverage/lcov.info